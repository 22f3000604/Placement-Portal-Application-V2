<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Placement Portal — Campus recruitment management for institutes, companies, and students">
    <title>Placement Portal</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <navbar-component v-if="currentUser" :user="currentUser" @logout="handleLogout"></navbar-component>
        <router-view @login-success="handleLogin" :user="currentUser"></router-view>
        <!-- Toast notifications -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>
    </div>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Vue Router CDN -->
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App Scripts -->
    <script src="/static/js/utils/api.js"></script>
    <script src="/static/js/utils/validators.js"></script>
    <script src="/static/js/components/Navbar.js"></script>
    <script src="/static/js/components/Login.js"></script>
    <script src="/static/js/components/RegisterStudent.js"></script>
    <script src="/static/js/components/RegisterCompany.js"></script>
    <script src="/static/js/components/AdminDashboard.js"></script>
    <script src="/static/js/components/AdminCompanies.js"></script>
    <script src="/static/js/components/AdminStudents.js"></script>
    <script src="/static/js/components/AdminDrives.js"></script>
    <script src="/static/js/components/AdminApplications.js"></script>
    <script src="/static/js/components/CompanyDashboard.js"></script>
    <script src="/static/js/components/CompanyCreateDrive.js"></script>
    <script src="/static/js/components/CompanyApplications.js"></script>
    <script src="/static/js/components/StudentDashboard.js"></script>
    <script src="/static/js/components/StudentDrives.js"></script>
    <script src="/static/js/components/StudentProfile.js"></script>
    <script src="/static/js/components/StudentHistory.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
